<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Yatharth Café
    </title>

    <!-- Fonts -->

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet"
    >

    <!-- CSS -->

    <link
        rel="stylesheet"
        href="./css/variables.css"
    >

    <link
        rel="stylesheet"
        href="./css/theme.css"
    >

    <link
        rel="stylesheet"
        href="./css/components.css"
    >

    <link
        rel="stylesheet"
        href="./css/animations.css"
    >

    <link
        rel="stylesheet"
        href="./css/style.css"
    >

</head>

<body>

    <div id="themeOverlay"></div>

    <div class="container page-load">

        

        <div class="top-section">
<!-- ========================= -->

<!-- HEADER -->

<!-- ========================= -->

<header class="header stagger">

    <div class="logo-section">

        <img
            src="./images/logo.png"
            class="logo"
            alt="Logo"
        >

        <div>

            <h1>

                YATHARTH

            </h1>

            <p>

                CAFÉ

            </p>

        </div>

    </div>



    <button
        id="themeToggle"
        class="theme-toggle"
    >

        🌙

    </button>

</header>


<!-- ========================= -->

<!-- HERO -->

<!-- ========================= -->

<section class="hero stagger">

    <h2>

        Good Food,

        <br>

        <span>

            Great Mood

        </span>

    </h2>

    <div class="hero-line"></div>

    <p>

        Choose your favorites and

        <br>

        place your order

    </p>

</section>

        </div>


<main>
<!-- ========================= -->

<!-- COMBO -->

<!-- ========================= -->

<section
    id="comboCard"
    class="combo-card stagger"
>

    <div class="popular-badge">

        ⭐ MOST POPULAR

    </div>

    <div class="combo-images">

        <img
            src="./images/sandwich.png"
            alt=""
        >

        <span>

            +

        </span>

        <img
            src="./images/coffee.png"
            alt=""
        >

    </div>

    <div class="combo-info">

        <h3>

            Sandwich +

            <br>

            Cold Coffee

        </h3>

        <h4>

            Combo

        </h4>

        <p class="saving">

            Save ₹10

        </p>

        <div class="price">

            ₹130

        </div>

        <button
            id="comboButton"
            class="primary-btn"
        >

            Add Combo

        </button>

    </div>

</section>



<!-- ========================= -->

<!-- MENU -->

<!-- ========================= -->

<section
    id="menuList"
    class="menu-list stagger"
>

    <!-- Menu Items Render Here -->

</section>



<!-- ========================= -->

<!-- SUGGESTIONS -->

<!-- Hidden Initially -->

<!-- ========================= -->

<section
    id="recommendationSection"
    class="recommendations hidden stagger"
>

    <h3>

        Frequently Added Together

    </h3>

    <div
        id="recommendationList"
        class="recommendation-list"
    >

    </div>

</section>

        </main>

</div>


<!-- ========================= -->

<!-- FLOATING CART -->

<!-- ========================= -->

<footer
    id="cartBar"
    class="cart-bar stagger"
>

    <div
        class="cart-info"
    >

        <div
            class="cart-icon"
        >

            🛒

            <span
                id="cartCount"
            >

                0

            </span>

        </div>

        <div>

            <h3 id="cartTitle">

                Cart Empty
            
            </h3>

            <p id="cartSubtitle">

                Subtotal ₹0

            </p>

        </div>

    </div>

    <button
        id="checkoutBtn"
        class="checkout-btn"
    >

        Proceed to Pay

    </button>

</footer>



<!-- ========================= -->
<!-- CART BOTTOM SHEET -->
<!-- ========================= -->

<div
    id="cartOverlay"
    class="cart-overlay hidden"
>

    <div
        id="cartSheet"
        class="cart-sheet"
    >

        <div class="sheet-handle"></div>

        <h2>Your Cart</h2>

        <div id="cartItems"></div>

        <div class="cart-total">

            <span>Subtotal</span>

            <span id="sheetTotal">
                ₹0
            </span>

        </div>

        <button
            id="checkoutBtn"
            class="primary-btn"
        >
            Proceed to Pay
        </button>

    </div>

</div>



<!-- ========================= -->

<!-- SCRIPTS -->

<!-- ========================= -->

<script src="./js/config.js"></script>

<script src="./js/theme.js"></script>

<script src="./js/cart.js"></script>

<script src="./js/app.js"></script>

</body>

</html>
